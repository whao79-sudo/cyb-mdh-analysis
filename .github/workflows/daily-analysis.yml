name: CYB MDH Daily Analysis

on:
  schedule:
    # 每个交易日下午 5:30 北京时间 (9:30 UTC)
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      start_date:
        description: '开始日期 (YYYY-MM-DD)'
        required: false
        default: '2024-01-01'
      end_date:
        description: '结束日期 (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Fetch data from baostock
      run: |
        python scripts/fetch_data.py ${{ github.event.inputs.start_date || '2024-01-01' }} ${{ github.event.inputs.end_date || '' }}
    
    - name: Run MDH analysis
      run: |
        python scripts/mdh_analysis.py
    
    - name: Run volume signal analysis
      run: |
        python scripts/volume_signal.py
    
    - name: Fetch ETF option PCR data
      run: |
        python scripts/fetch_option_pcr.py
    
    - name: Fetch QVIX (implied volatility) data
      run: |
        python scripts/fetch_qvix.py
    
    - name: Generate index page from JSON results
      run: |
        python scripts/generate_index.py
    
    - name: Copy outputs to docs for GitHub Pages
      run: |
        mkdir -p docs/output
        cp -r output/* docs/output/
    
    - name: Commit and push results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/cyb_data.db data/option_pcr.csv data/qvix_data.csv output/ docs/
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🦞 Auto-update: $(date '+%Y-%m-%d %H:%M') CYB MDH analysis" && git push)
